name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm run typecheck
        continue-on-error: true

      - name: Build API Server
        run: pnpm --filter @workspace/api-server run build
        continue-on-error: true

  notify:
    name: Notifikasi Push
    runs-on: ubuntu-latest
    needs: build
    if: always()

    steps:
      - name: Status Push
        run: |
          echo '================================'
          echo 'Push berhasil ke Yapper-Fund!'
          echo 'Repository: https://github.com/yapperfund/Yapper-Fund'
          echo 'Waktu: '$(date '+%Y-%m-%d %H:%M:%S UTC')
          echo '================================'
